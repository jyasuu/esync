version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# esync — SAP MM example stack
#   postgres        Postgres 16 with MM tables + CDC triggers
#   elasticsearch   Single-node ES 8.13 (security off for dev)
#   kibana          Data browser at :5601
#   esync-serve     GraphQL API at :4000
#   esync-index     One-shot bulk indexer (runs and exits)
#   esync-watch     Long-running CDC daemon
# ─────────────────────────────────────────────────────────────────────────────

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: esync
      POSTGRES_PASSWORD: esync
      POSTGRES_DB: esync
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./scripts/init_sap_mm.sql:/docker-entrypoint-initdb.d/01_init_sap_mm.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U esync"]
      interval: 5s
      timeout: 5s
      retries: 10

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health | grep -v '\"status\":\"red\"'"]
      interval: 10s
      timeout: 10s
      retries: 20

  kibana:
    image: docker.elastic.co/kibana/kibana:8.13.0
    environment:
      ELASTICSEARCH_HOSTS: "http://elasticsearch:9200"
    ports:
      - "5601:5601"
    depends_on:
      elasticsearch:
        condition: service_healthy

  # GraphQL server — live read path over Postgres
  esync-serve:
    build:
      context: ../..       # points at the esync project root (where Cargo.toml lives)
      dockerfile: Dockerfile
    command: ["serve"]
    environment:
      ESYNC_CONFIG: /app/esync-sap-mm.yaml
      ESYNC_LOG: debug
    volumes:
      - ./esync-sap-mm.yaml:/app/esync-sap-mm.yaml:ro
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy

  # One-shot bulk indexer — runs once, exits 0
  esync-index:
    build:
      context: ../..
      dockerfile: Dockerfile
    command: ["index"]
    environment:
      ESYNC_CONFIG: /app/esync-sap-mm.yaml
      ESYNC_LOG: debug
    volumes:
      - ./esync-sap-mm.yaml:/app/esync-sap-mm.yaml:ro
    depends_on:
      postgres:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    profiles:
      - index

  # CDC daemon — watches for changes, upserts/deletes in ES
  esync-watch:
    build:
      context: ../..
      dockerfile: Dockerfile
    command: ["watch"]
    environment:
      ESYNC_CONFIG: /app/esync-sap-mm.yaml
      ESYNC_LOG: debug
    volumes:
      - ./esync-sap-mm.yaml:/app/esync-sap-mm.yaml:ro
    depends_on:
      postgres:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    profiles:
      - watch

volumes:
  pg_data:
  es_data:
