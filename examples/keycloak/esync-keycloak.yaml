postgres:
  url: "postgres://esync_app:${DB_PASSWORD}@db.example.com:5432/myapp"
  pool_size: 10

elasticsearch:
  url: "https://es.example.com:9200"

graphql:
  host: "0.0.0.0"
  port: 4000
  playground: false

  oauth2:
    validation_mode: jwks

    # Keycloak 17+:  https://<host>/realms/<realm>/protocol/openid-connect/certs
    # Keycloak ≤ 16: https://<host>/auth/realms/<realm>/protocol/openid-connect/certs
    jwks_uri: "https://iam.example.com/auth/realms/service/protocol/openid-connect/certs"
    jwks_cache_ttl_secs: 300

    required_issuer: "https://iam.example.com/auth/realms/service"
    # required_audience: "my-api"   # omit to skip audience check

    clock_skew_secs: 30
    require_auth: true

    # jwt_claims_param and jwt_token_type_param use their defaults:
    #   request.jwt.claims      — full JWT payload as jsonb
    #   request.jwt.token_type  — "user" | "client_credentials" | "anonymous"
    # No other RLS config needed. Policies extract whatever they need via ::jsonb.

entities:
  - name: Order
    table: orders
    index: orders
    id_column: id
    columns:
      - name: id
        pg_type: UUID
      - name: user_id
        pg_type: UUID
      - name: status
        pg_type: TEXT
      - name: total
        pg_type: NUMERIC
