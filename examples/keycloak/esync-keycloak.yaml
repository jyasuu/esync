postgres:
  url: "postgres://esync_app:${DB_PASSWORD}@db.example.com:5432/myapp"
  pool_size: 10

elasticsearch:
  url: "https://es.example.com:9200"
  username: "${ES_USER}"
  password: "${ES_PASSWORD}"

graphql:
  host: "0.0.0.0"
  port: 4000
  playground: false

  oauth2:
    # ── Validation ─────────────────────────────────────────────────────────
    validation_mode: jwks

    # Keycloak JWKS endpoint.
    # Format (Keycloak 17+, no /auth prefix):
    #   https://<host>/realms/<realm>/protocol/openid-connect/certs
    # Format (Keycloak ≤ 16, legacy /auth prefix):
    #   https://<host>/auth/realms/<realm>/protocol/openid-connect/certs
    jwks_uri: "https://iam.example.com/realms/service/protocol/openid-connect/certs"
    jwks_cache_ttl_secs: 300

    # iss in Keycloak tokens is the realm URL (no /certs suffix).
    required_issuer: "https://iam.example.com/realms/service"

    # aud is the client ID by default, or "account" for some flows.
    # Leave unset to skip audience validation, or set to your resource server client ID.
    required_audience: "esync-api"

    clock_skew_secs: 30
    require_auth: true

    # ── Token-type detection ───────────────────────────────────────────────
    # Keycloak client-credentials tokens have `azp` but no `session_state`
    # or user-identity claims — auto-detected without this setting.
    # Uncomment only if auto-detection fails for your Keycloak setup:
    # token_type_claim: "gty"

    # ── Client-credential (service account) RLS ───────────────────────────
    # Keycloak puts realm roles at realm_access.roles (nested object),
    # not at a top-level `roles` claim.
    rls_role_claim_path: "realm_access.roles"

    # Keycloak uses `azp` (not `client_id`) for the service account client ID.
    azp_as_client_id: true

    # ── User token RLS ─────────────────────────────────────────────────────
    # Map these Keycloak user claims to SET LOCAL rls.<claim> in Postgres.
    # Keycloak standard user claims:
    #   sub                  — user UUID (always present)
    #   preferred_username   — login name
    #   email                — email address
    #   given_name / family_name
    # Custom claims (add via Keycloak mapper → Token Claim Name):
    #   tenant_id, department, cost_center, etc.
    rls_user_attributes:
      - sub
      - preferred_username
      - email
      - tenant_id        # custom claim — add a User Attribute mapper in Keycloak

entities:
  - name: Order
    table: orders
    index: orders
    id_column: id
    columns:
      - name: id
        pg_type: UUID
      - name: user_id
        pg_type: UUID
      - name: status
        pg_type: TEXT
      - name: total
        pg_type: NUMERIC
      - name: created_at
        pg_type: TIMESTAMPTZ
